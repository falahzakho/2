<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INGCO TOOLS - ئەنجیکۆ</title>
    
    <link rel="icon" type="image/x-icon" href="https://example.com/favicon.ico">

    <style>
        :root {
            --primary-color: #f9a825;
            --primary-hover: #f57f17;
            --dark-color: #0f172a;
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --text-main: #334155;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --accent-blue: #e0f2fe;
            --accent-blue-text: #0369a1;
            --success-color: #10b981;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.5;
        }

        header {
            background: linear-gradient(135deg, var(--dark-color) 0%, #1e293b 100%);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 25px rgba(0,0,0,0.1);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--primary-color);
        }

        .logo-area h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1.5px;
            color: var(--primary-color);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .logo-area span {
            font-size: 13px;
            color: #cbd5e1;
            display: block;
            margin-top: 4px;
            font-weight: 500;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .lang-switcher {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .header-cart-box {
            position: relative;
        }

        .header-cart-btn {
            background: rgba(255, 255, 255, 0.08);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 42px;
            height: 42px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .cart-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background-color: #dc2626;
            color: white;
            font-size: 11px;
            font-weight: bold;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        .lang-switcher:hover {
            background: var(--primary-color);
            color: var(--dark-color);
            border-color: var(--primary-color);
        }

        .header-cart-btn:hover {
            background: var(--success-color);
            border-color: var(--success-color);
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            left: -350px; 
            width: 350px;
            height: 100%;
            background: var(--card-bg);
            box-shadow: 4px 0 25px rgba(0,0,0,0.15);
            z-index: 1001;
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
        }

        html[dir="ltr"] .cart-sidebar {
            left: auto;
            right: -350px;
            border-right: none;
            border-left: 1px solid var(--border-color);
        }

        .cart-sidebar.open {
            left: 0;
        }
        html[dir="ltr"] .cart-sidebar.open {
            right: 0;
            left: auto;
        }

        .cart-sidebar-header {
            padding: 20px;
            background: var(--dark-color);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .cart-sidebar-header h2 {
            margin: 0;
            font-size: 18px;
            color: var(--primary-color);
        }

        .close-cart {
            font-size: 24px;
            cursor: pointer;
            color: white;
        }

        .cart-items-list {
            padding: 15px;
            overflow-y: auto;
            flex-grow: 1;
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .cart-item img {
            width: 50px;
            height: 50px;
            object-fit: contain;
            background: #f8fafc;
            border-radius: 8px;
            padding: 3px;
        }

        .cart-item-details {
            flex-grow: 1;
        }

        .cart-item-title {
            font-size: 13px;
            font-weight: 700;
            margin: 0 0 6px 0;
            color: var(--dark-color);
        }

        .cart-item-price {
            font-size: 13px;
            color: #dc2626;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .qty-btn {
            background-color: #f1f5f9;
            border: 1px solid var(--border-color);
            width: 26px;
            height: 26px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            color: var(--dark-color);
        }

        .qty-btn:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
        }

        .qty-number {
            font-size: 14px;
            font-weight: 700;
            min-width: 20px;
            text-align: center;
        }

        .cart-item-remove {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 16px;
            padding: 5px;
        }

        .cart-sidebar-footer {
            padding: 20px;
            border-top: 2px solid var(--border-color);
            background: #f8fafc;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-weight: 800;
            font-size: 16px;
            margin-bottom: 15px;
            color: var(--dark-color);
        }

        .checkout-btn {
            display: block;
            width: 100%;
            background: var(--success-color);
            color: white;
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 700;
            transition: background 0.2s;
        }

        .checkout-btn:hover {
            background: #047857;
        }

        .cart-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: 1000;
        }

        .cart-overlay.show {
            display: block;
        }

        .container { max-width: 1300px; margin: 30px auto; padding: 0 20px; }
        .search-row { display: flex; justify-content: center; margin-bottom: 30px; }
        .search-box { position: relative; width: 100%; max-width: 550px; }
        .search-box input { width: 100%; padding: 14px 45px 14px 25px; border-radius: 50px; border: 2px solid transparent; background-color: var(--card-bg); font-size: 15px; font-weight: 500; outline: none; box-shadow: 0 4px 15px rgba(15, 23, 42, 0.05); transition: all 0.3s ease; }
        .search-box input:focus { border-color: var(--primary-color); box-shadow: 0 10px 25px rgba(249, 168, 37, 0.15); }
        .search-box::after { content: "🔍"; position: absolute; top: 50%; right: 18px; transform: translateY(-50%); font-size: 16px; color: #94a3b8; }
        html[dir="ltr"] .search-box input { padding: 14px 25px 14px 45px; }
        html[dir="ltr"] .search-box::after { right: auto; left: 18px; }
        .categories-filter { display: flex; gap: 10px; margin-bottom: 30px; overflow-x: auto; padding-bottom: 10px; }
        .cat-btn { background: var(--card-bg); color: #475569; border: 1px solid var(--border-color); padding: 10px 20px; border-radius: 30px; cursor: pointer; font-weight: 700; font-size: 13px; white-space: nowrap; transition: all 0.2s; }
        .cat-btn.active, .cat-btn:hover { background: var(--dark-color); color: var(--primary-color); border-color: var(--dark-color); }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 768px) { .menu-grid { grid-template-columns: repeat(4, 1fr); gap: 25px; } }
        .product-card { background: var(--card-bg); border-radius: 20px; border: 1px solid rgba(226, 232, 242, 0.7); overflow: hidden; display: flex; flex-direction: column; position: relative; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px rgba(15, 23, 42, 0.08), 0 0 0 2px var(--primary-color); }
        .card-img-box { background: #ffffff; padding: 15px; height: 160px; display: flex; align-items: center; justify-content: center; border-bottom: 1px solid #f1f5f9; }
        @media (min-width: 768px) { .card-img-box { height: 220px; padding: 25px; } }
        .card-img-box img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .card-body { padding: 15px; display: flex; flex-direction: column; flex-grow: 1; }
        .card-cat { font-size: 11px; color: #15803d; background: #f0fdf4; padding: 4px 10px; border-radius: 30px; align-self: flex-start; font-weight: 700; margin-bottom: 10px; }
        .card-title { font-size: 14px; font-weight: 700; margin: 0 0 15px 0; color: var(--dark-color); min-height: 38px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .card-footer { display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 12px; border-top: 1px solid #f1f5f9; gap: 8px; }
        .card-price { font-size: 16px; font-weight: 800; color: #dc2626; }
        .actions-btn-group { display: flex; gap: 6px; }
        .view-btn { background-color: var(--primary-color); color: var(--dark-color); border: none; padding: 8px 12px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 13px; }
        .direct-cart-btn { background-color: var(--success-color); color: white; border: none; padding: 8px 12px; border-radius: 10px; font-weight: 700; cursor: pointer; font-size: 14px; }
        .loading { grid-column: 1 / -1; text-align: center; padding: 60px; font-size: 16px; font-weight: 700; color: var(--text-muted); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(8px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: var(--card-bg); width: 100%; max-width: 650px; border-radius: 24px; position: relative; max-height: 85vh; overflow-y: auto; padding: 30px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.3); }
        .close-modal { position: absolute; top: 20px; left: 20px; font-size: 24px; cursor: pointer; background: #f1f5f9; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        html[dir="ltr"] .close-modal { left: auto; right: 20px; }
        .modal-gallery { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin: 20px 0; }
        .modal-gallery img { width: 100%; height: 120px; object-fit: contain; border: 2px solid var(--border-color); border-radius: 14px; padding: 6px; background: #fff; }
        .spec-badge { background: var(--accent-blue); color: var(--accent-blue-text); padding: 8px 16px; border-radius: 12px; font-size: 14px; font-weight: 700; display: inline-block; }
        .video-box { background: #fffbeb; padding: 14px; border-radius: 14px; text-align: center; margin-top: 25px; border: 2px dashed var(--primary-color); }
        .video-box a { color: #b45309; text-decoration: none; font-weight: 700; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <h1>INGCO TOOLS</h1>
        <span id="brand-subtitle">سیستەمێ کۆگایا کۆمپانیا ئەنجیکۆ</span>
    </div>
    <div class="header-actions">
        <div class="header-cart-box">
            <button class="header-cart-btn" onclick="toggleCart()" title="سەبەتەی کڕین">
                <span class="cart-icon">🛒</span>
            </button>
            <div id="cart-count-badge" class="cart-badge">0</div>
        </div>
        <button class="lang-switcher" onclick="toggleLanguage()" title="Change Language">
            <span class="globe-icon">🌐</span>
        </button>
    </div>
</header>

<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
<div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-sidebar-header">
        <h2 id="cart-panel-title">سەبەتەی کڕین</h2>
        <span class="close-cart" onclick="toggleCart()">&times;</span>
    </div>
    <div class="cart-items-list" id="cart-items-container"></div>
    <div class="cart-sidebar-footer">
        <div class="cart-total">
            <span id="total-text">کۆی گشتی:</span>
            <span id="cart-total-price">0</span>
        </div>
        <a href="cart.html" class="checkout-btn" id="checkout-btn-text">تەواوکردنی داواکاری</a>
    </div>
</div>

<div class="container">
    <div class="search-row">
        <div class="search-box">
            <input type="text" id="search-input" oninput="filterProducts()" placeholder="بگەڕێ بۆ ناوی کاڵا...">
        </div>
    </div>
    <div class="categories-filter" id="categories-container"></div>
    <div class="menu-grid" id="menu-grid-container">
        <div id="loading-status" class="loading">چاوەڕوانبە... داتاکان دەخوێندرێنەوە...</div>
    </div>
</div>

<div class="modal" id="product-modal">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <h2 id="modal-title" style="margin-top:0; font-size: 20px; color: var(--dark-color);"></h2>
        <div class="modal-gallery" id="modal-images"></div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px;">
            <div style="font-size: 24px; font-weight: 900; color: #dc2626;" id="modal-price"></div>
            <div id="modal-spec" class="spec-badge"></div>
        </div>
        <h4 id="modal-details-title" style="margin-bottom: 8px; font-size: 15px;">ڕووکڕنەوە و تایبەتمەندی:</h4>
        <p id="modal-desc" style="line-height: 1.7; color:#475569; font-size: 14px; margin-top: 0;"></p>
        <div class="video-box" id="modal-video"></div>
    </div>
</div>

<script>
    const sheetCsvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRdNf5g0ad_RaZViKmkZSz5hBkSBOk0F84SUEprJoQ8Bn4utsLT2_o1S-xqSeyBM2idXxL3CPA693Dw/pub?output=csv";

    let productsData = [];
    let currentLang = 'ku'; 
    let selectedCategory = 'all';
    let cart = JSON.parse(localStorage.getItem('ingco_cart')) || [];

    function fixImageUrl(url) {
        if (!url || url.trim() === "") return 'https://via.placeholder.com/200?text=INGCO';
        return url.trim();
    }

    function formatNumber(num) {
        return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
    }

    async function fetchSheetData() {
        try {
            const response = await fetch(sheetCsvUrl);
            const data = await response.text();
            const lines = data.split(/\r?\n/);
            productsData = [];

            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const columns = parseCsvLine(lines[i]);
                
                if (columns.length >= 12) {
                    productsData.push({
                        id: columns[0].trim(),        
                        cat_ku: columns[1].trim(),    
                        cat_ar: columns[2].trim(),    
                        name_ku: columns[3].trim(),   
                        name_ar: columns[4].trim(),   
                        price: columns[5].trim(),     
                        img1: columns[6].trim(),      
                        img2: columns[7].trim(),      
                        img3: columns[8].trim(),      
                        video: columns[9].trim(),     
                        desc_ku: columns[10].trim(),  
                        desc_ar: columns[11].trim(),
                        spec: columns[12] ? columns[12].trim() : ''
                    });
                }
            }
            buildCategoryFilter();
            filterProducts();
            updateCartUI();
        } catch (error) {
            console.error(error);
        }
    }

    function parseCsvLine(text) {
        let p = '', c = '', r = []; let q = false;
        for (let i = 0; i < text.length; i++) {
            c = text[i]; if (c === '"') { q = !q; } else if (c === ',' && !q) { r.push(p); p = ''; } else { p += c; }
        }
        r.push(p); return r;
    }

    function buildCategoryFilter() {
        const container = document.getElementById('categories-container');
        container.innerHTML = '';
        const categories = new Set();
        productsData.forEach(p => categories.add(currentLang === 'ku' ? p.cat_ku : p.cat_ar));

        const allBtn = document.createElement('button');
        allBtn.className = `cat-btn ${selectedCategory === 'all' ? 'active' : ''}`;
        allBtn.innerText = currentLang === 'ku' ? 'هەموو جۆرەکان' : 'الكل';
        allBtn.onclick = () => { selectedCategory = 'all'; updateActiveFilterBtn(allBtn); filterProducts(); };
        container.appendChild(allBtn);

        categories.forEach(cat => {
            if(!cat) return;
            const btn = document.createElement('button');
            btn.className = `cat-btn ${selectedCategory === cat ? 'active' : ''}`;
            btn.innerText = cat;
            btn.onclick = () => { selectedCategory = cat; updateActiveFilterBtn(btn); filterProducts(); };
            container.appendChild(btn);
        });
    }

    function updateActiveFilterBtn(activeBtn) {
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        activeBtn.classList.add('active');
    }

    function toggleCart() {
        document.getElementById('cart-sidebar').classList.toggle('open');
        document.getElementById('cart-overlay').classList.toggle('show');
    }

    function addToCart(productId) {
        const product = productsData.find(p => p.id === productId);
        if (!product) return;

        const existingProduct = cart.find(item => item.id === productId);
        if (existingProduct) {
            existingProduct.quantity += 1;
        } else {
            cart.push({
                id: product.id,
                name_ku: product.name_ku,
                name_ar: product.name_ar,
                price: product.price,
                img: product.img1,
                quantity: 1
            });
        }
        localStorage.setItem('ingco_cart', JSON.stringify(cart));
        updateCartUI();
    }

    function changeQuantity(productId, amount) {
        const item = cart.find(i => i.id === productId);
        if (!item) return;

        item.quantity += amount;

        if (item.quantity <= 0) {
            cart = cart.filter(i => i.id !== productId);
        }

        localStorage.setItem('ingco_cart', JSON.stringify(cart));
        updateCartUI();
    }

    function removeFromCart(productId) {
        cart = cart.filter(item => item.id !== productId);
        localStorage.setItem('ingco_cart', JSON.stringify(cart));
        updateCartUI();
    }

    function updateCartUI() {
        const badge = document.getElementById('cart-count-badge');
        const totalItems = cart.reduce((total, item) => total + item.quantity, 0);
        badge.innerText = totalItems;
        badge.style.display = totalItems === 0 ? 'none' : 'flex';

        const container = document.getElementById('cart-items-container');
        container.innerHTML = '';

        if(cart.length === 0) {
            container.innerHTML = `<div style="text-align:center; padding:30px; color:var(--text-muted); font-weight:700;">${currentLang === 'ku' ? 'سەبەتەکەت بەتاڵە!' : 'سلتك فارغة!'}</div>`;
            document.getElementById('cart-total-price').innerText = "0";
            return;
        }

        let totalCartPrice = 0;
        cart.forEach(item => {
            const name = currentLang === 'ku' ? item.name_ku : item.name_ar;
            const itemTotal = parseFloat(item.price) * item.quantity;
            totalCartPrice += itemTotal;

            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <img src="${fixImageUrl(item.img)}" onerror="this.src='https://via.placeholder.com/200?text=INGCO'">
                <div class="cart-item-details">
                    <h4 class="cart-item-title">${name}</h4>
                    <div class="cart-item-price">${formatNumber(item.price)}</div>
                    <div class="quantity-control">
                        <button class="qty-btn" onclick="changeQuantity('${item.id}', -1)">-</button>
                        <span class="qty-number">${item.quantity}</span>
                        <button class="qty-btn" onclick="changeQuantity('${item.id}', 1)">+</button>
                    </div>
                </div>
                <button class="cart-item-remove" onclick="removeFromCart('${item.id}')">🗑️</button>
            `;
            container.appendChild(div);
        });

        document.getElementById('cart-total-price').innerText = formatNumber(totalCartPrice);
    }

    function filterProducts() {
        const query = document.getElementById('search-input').value.toLowerCase();
        const gridContainer = document.getElementById('menu-grid-container');
        gridContainer.innerHTML = '';

        const filtered = productsData.filter(prod => {
            const catName = currentLang === 'ku' ? prod.cat_ku : prod.cat_ar;
            const prodName = currentLang === 'ku' ? prod.name_ku : prod.name_ar;
            return (selectedCategory === 'all' || catName === selectedCategory) && prodName.toLowerCase().includes(query);
        });

        if(filtered.length === 0) {
            gridContainer.innerHTML = `<div class="loading">${currentLang === 'ku' ? 'هیچ کاڵایەک نەدۆزرایەوە!' : 'لم يتم العثور على أي مادة!'}</div>`;
            return;
        }

        filtered.forEach(prod => {
            const catName = currentLang === 'ku' ? prod.cat_ku : prod.cat_ar;
            const prodName = currentLang === 'ku' ? prod.name_ku : prod.name_ar;
            const btnText = currentLang === 'ku' ? 'بینین' : 'عرض';
            const cartTitle = currentLang === 'ku' ? 'زیادکردن بۆ سەبەتە' : 'إضافة للسلة';

            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="card-img-box">
                    <img src="${fixImageUrl(prod.img1)}" onerror="this.src='https://via.placeholder.com/200?text=INGCO'">
                </div>
                <div class="card-body">
                    <span class="card-cat">${catName}</span>
                    <h3 class="card-title">${prodName}</h3>
                    <div class="card-footer">
                        <span class="card-price">${formatNumber(prod.price)}</span>
                        <div class="actions-btn-group">
                            <button class="view-btn" onclick="openModal('${prod.id}')">${btnText}</button>
                            <button class="direct-cart-btn" onclick="addToCart('${prod.id}')" title="${cartTitle}">🛒</button>
                        </div>
                    </div>
                </div>
            `;
            gridContainer.appendChild(card);
        });
    }

    function toggleLanguage() {
        const html = document.documentElement;
        const searchInp = document.getElementById('search-input');
        
        if (currentLang === 'ku') {
            currentLang = 'ar';
            html.lang = 'ar'; html.dir = 'rtl';
            document.getElementById('brand-subtitle').innerText = 'نظام إدارة مخزن شركة إنجيكو';
            document.getElementById('modal-details-title').innerText = 'المواصفات والتفاصيل:';
            document.getElementById('cart-panel-title').innerText = 'سلة التسوق';
            document.getElementById('total-text').innerText = 'المجموع الكلي:';
            document.getElementById('checkout-btn-text').innerText = 'إتمام الطلب';
            searchInp.placeholder = "ابحث عن اسم المادة...";
        } else {
            currentLang = 'ku';
            html.lang = 'ku'; html.dir = 'rtl';
            document.getElementById('brand-subtitle').innerText = 'سیستەمێ کۆگایا کۆمپانیا ئەنجیکۆ';
            document.getElementById('modal-details-title').innerText = 'ڕووکڕنەوە و تایبەتمەندی:';
            document.getElementById('cart-panel-title').innerText = 'سەبەتەی کڕین';
            document.getElementById('total-text').innerText = 'کۆی گشتی:';
            document.getElementById('checkout-btn-text').innerText = 'تەواوکردنی داواکاری';
            searchInp.placeholder = "بگەڕێ بۆ ناوی کاڵا...";
        }
        
        selectedCategory = 'all'; 
        buildCategoryFilter();
        filterProducts();
        updateCartUI();
    }

    function openModal(id) {
        const prod = productsData.find(p => p.id == id); if(!prod) return;
        const modal = document.getElementById('product-modal');
        document.getElementById('modal-title').innerText = currentLang === 'ku' ? prod.name_ku : prod.name_ar;
        document.getElementById('modal-desc').innerText = currentLang === 'ku' ? prod.desc_ku : prod.desc_ar;
        document.getElementById('modal-price').innerText = formatNumber(prod.price);
        const specBox = document.getElementById('modal-spec');
        if(prod.spec) { specBox.style.display = 'inline-block'; specBox.innerText = prod.spec; } else { specBox.style.display = 'none'; }
        const imgsContainer = document.getElementById('modal-images'); let imagesHtml = '';
        if(prod.img1) imagesHtml += `<img src="${fixImageUrl(prod.img1)}" onerror="this.style.display='none'">`;
        if(prod.img2) imagesHtml += `<img src="${fixImageUrl(prod.img2)}" onerror="this.style.display='none'">`;
        if(prod.img3) imagesHtml += `<img src="${fixImageUrl(prod.img3)}" onerror="this.style.display='none'">`;
        imgsContainer.innerHTML = imagesHtml;
        const videoBox = document.getElementById('modal-video');
        if(prod.video && prod.video.includes('http')) {
            const videoText = currentLang === 'ku' ? '▶ تەماشای ڤیدیۆیا ڕوونکرنێ بکە' : '▶ شاهد فيديو الشرح والتفاصيل';
            videoBox.style.display = 'block'; videoBox.innerHTML = `<a href="${prod.video}" target="_blank">${videoText}</a>`;
        } else { videoBox.style.display = 'none'; }
        modal.style.display = 'flex';
    }

    function closeModal() { document.getElementById('product-modal').style.display = 'none'; }
    window.onload = fetchSheetData;
</script>

</body>
</html>
